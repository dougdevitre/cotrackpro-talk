name: Deploy to Fly

# Builds the Docker image and deploys the voice center to Fly.io. Pulls
# the app's runtime secrets from AWS SSM Parameter Store (canonical
# source) and pushes them into Fly's secrets store on every run, then
# deploys. Idempotent — running twice with no changes is a no-op.
#
# Required secrets (in the "production" GitHub Environment):
#   FLY_API_TOKEN          — from https://fly.io/user/personal_access_tokens
#   AWS_ACCESS_KEY_ID      — IAM user with ssm:GetParameter on /cotrackpro/prod/*
#   AWS_SECRET_ACCESS_KEY  — paired with the access key above
#
# Optional repository variables:
#   FLY_APP_NAME           — defaults to "cotrackpro-talk"
#   AWS_REGION             — defaults to "us-east-1"
#   SSM_PREFIX             — defaults to "/cotrackpro/prod"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "api/**"
      - "package*.json"
      - "tsconfig*.json"
      - "Dockerfile"
      - "fly.toml"
      - ".dockerignore"
      - ".github/workflows/fly-deploy.yml"

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy to Fly
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Scope the job to the "production" GitHub Environment so it can
    # read the FLY_API_TOKEN / AWS_* secrets stored there. Without
    # this, ${{ secrets.X }} only reads repository-scope secrets and
    # falls through empty for environment-scoped ones, which is what
    # caused the early "Configure AWS credentials" failures.
    environment: production
    env:
      FLY_APP_NAME: ${{ vars.FLY_APP_NAME || 'cotrackpro-talk' }}
      AWS_REGION:   ${{ vars.AWS_REGION || 'us-east-1' }}
      SSM_PREFIX:   ${{ vars.SSM_PREFIX || '/cotrackpro/prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify required secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          missing=()
          [ -z "$FLY_API_TOKEN" ]         && missing+=("FLY_API_TOKEN")
          [ -z "$AWS_ACCESS_KEY_ID" ]     && missing+=("AWS_ACCESS_KEY_ID")
          [ -z "$AWS_SECRET_ACCESS_KEY" ] && missing+=("AWS_SECRET_ACCESS_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing secret(s) in 'production' environment: ${missing[*]}"
            echo "::error::Add them at https://github.com/${{ github.repository }}/settings/environments"
            exit 1
          fi
          echo "All required secrets present."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pull runtime secrets from Parameter Store
        id: ssm
        run: |
          # Pull each SSM value, mask it in logs, and stash for the
          # Fly secrets step. Mapping (SSM suffix → env var):
          mapping=(
            "twilio/account_sid:TWILIO_ACCOUNT_SID"
            "twilio/auth_token:TWILIO_AUTH_TOKEN"
            "twilio/phone_number:TWILIO_PHONE_NUMBER"
            "elevenlabs/api_key:ELEVENLABS_API_KEY"
            "ai/anthropic/api_key:ANTHROPIC_API_KEY"
            "voice/inbound_phone_map:INBOUND_PHONE_VOICE_MAP"
          )
          : > "$RUNNER_TEMP/secrets.env"
          for pair in "${mapping[@]}"; do
            suffix="${pair%%:*}"
            name="${pair##*:}"
            value=$(aws ssm get-parameter \
              --name "$SSM_PREFIX/$suffix" \
              --with-decryption \
              --query 'Parameter.Value' --output text)
            # Mask so the value never appears in subsequent log output.
            echo "::add-mask::$value"
            # Single-quoted so JSON values pass through intact.
            printf "%s=%q\n" "$name" "$value" >> "$RUNNER_TEMP/secrets.env"
          done
          # Add the two static settings:
          printf "%s=%q\n" "SERVER_DOMAIN" "$FLY_APP_NAME.fly.dev" >> "$RUNNER_TEMP/secrets.env"
          printf "%s=%q\n" "VALIDATE_TWILIO_SIGNATURE" "true" >> "$RUNNER_TEMP/secrets.env"
          echo "wrote $(wc -l < $RUNNER_TEMP/secrets.env) entries"

      - name: Setup flyctl
        # superfly/flyctl-actions/setup-flyctl@master left flyctl off
        # the runner PATH for the next step (cmd-not-found, exit 127).
        # Install manually + append to GITHUB_PATH so every subsequent
        # step sees the binary.
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"
          # Verify in this same step (uses absolute path because the
          # PATH change only takes effect for later steps).
          "$HOME/.fly/bin/flyctl" version

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if fly apps list -j | grep -q "\"Name\":\"$FLY_APP_NAME\""; then
            echo "app $FLY_APP_NAME exists"
          else
            echo "creating app $FLY_APP_NAME"
            fly apps create "$FLY_APP_NAME"
          fi

      - name: Stage Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # --stage defers the implicit re-deploy until our explicit
          # deploy step. Otherwise fly secrets set triggers a second
          # rollout and we waste a build.
          args=()
          while IFS= read -r line; do
            args+=("$line")
          done < "$RUNNER_TEMP/secrets.env"
          # shellcheck disable=SC2068
          fly secrets set ${args[@]} --stage -a "$FLY_APP_NAME"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: fly deploy --remote-only -a "$FLY_APP_NAME"

      - name: Print live URL
        run: |
          echo "::notice title=Live at::https://$FLY_APP_NAME.fly.dev"
          echo "Live at https://$FLY_APP_NAME.fly.dev"
